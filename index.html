<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VK Debug Trace</title>
  <style>
    body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; margin: 0; background: #0b1020; color: #e5e7eb; }
    header { position: sticky; top: 0; background: #111827; padding: 12px 16px; border-bottom: 1px solid #374151; display: flex; gap: 8px; align-items: center; z-index: 10; }
    button, input { background: #1f2937; color: #e5e7eb; border: 1px solid #374151; padding: 8px 10px; border-radius: 8px; }
    #wrap { padding: 16px; display: grid; gap: 12px; }
    .trace { border: 1px solid #374151; border-radius: 12px; overflow: hidden; background: #111827; }
    .trace-head { padding: 10px 12px; background: #0f172a; border-bottom: 1px solid #374151; font-weight: 700; }
    .row { padding: 10px 12px; border-top: 1px solid #1f2937; }
    .meta { color: #93c5fd; margin-bottom: 6px; }
    pre { white-space: pre-wrap; word-break: break-word; margin: 0; color: #d1d5db; }
    .muted { color: #9ca3af; }
  </style>
</head>
<body>
  <header>
    <button id="clearBtn">Очистить trace</button>
    <label class="muted">trace_id:</label>
    <input id="traceId" placeholder="необязательно" />
    <label class="muted">auto refresh</label>
    <input id="auto" type="checkbox" checked />
  </header>

  <div id="wrap"></div>

  <script>
    const wrap = document.getElementById('wrap')
    const clearBtn = document.getElementById('clearBtn')
    const auto = document.getElementById('auto')
    const traceIdInput = document.getElementById('traceId')

    let lastId = 0
    const groups = new Map()

    function renderRow(row) {
      let box = groups.get(row.trace_id)
      if (!box) {
        box = document.createElement('div')
        box.className = 'trace'
        box.innerHTML = '<div class="trace-head"></div><div class="body"></div>'
        box.querySelector('.trace-head').textContent = row.trace_id
        wrap.prepend(box)
        groups.set(row.trace_id, box)
      }

      const body = box.querySelector('.body')
      const el = document.createElement('div')
      el.className = 'row'
      el.innerHTML = `
        <div class="meta">${row.created_at} | ${row.level} | ${row.step}</div>
        <pre>${JSON.stringify(row.payload, null, 2)}</pre>
      `
      body.appendChild(el)
    }

    async function load() {
      const params = new URLSearchParams()
      params.set('since_id', String(lastId))
      params.set('limit', '500')
      const traceId = traceIdInput.value.trim()
      if (traceId) params.set('trace_id', traceId)

      const res = await fetch('/api/debug-feed?' + params.toString(), { cache: 'no-store' })
      const json = await res.json()
      const rows = json.rows || []

      for (const row of rows) {
        lastId = Math.max(lastId, row.id)
        renderRow(row)
      }
    }

    clearBtn.onclick = async () => {
      await fetch('/api/debug-clear', { method: 'POST' })
      wrap.innerHTML = ''
      groups.clear()
      lastId = 0
    }

    setInterval(() => {
      if (auto.checked) load().catch(console.error)
    }, 1000)

    load().catch(console.error)
  </script>
</body>
</html>
